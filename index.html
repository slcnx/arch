<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全栈架构物理模拟器 - 全双工回程版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pipeline-line {
            background-image: linear-gradient(to right, #ccc 50%, rgba(255, 255, 255, 0) 0%);
            background-position: bottom;
            background-size: 10px 1px;
            background-repeat: repeat-x;
        }

        @keyframes packet-move {
            0% {
                left: 0%;
                opacity: 1;
                transform: scale(1);
            }

            100% {
                left: 100%;
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes packet-return {
            0% {
                left: 100%;
                opacity: 1;
                transform: rotate(180deg);
            }

            100% {
                left: 0%;
                opacity: 1;
                transform: rotate(180deg);
            }
        }

        .packet {
            width: 12px;
            height: 12px;
            background: #3b82f6;
            border-radius: 50%;
            position: absolute;
            top: -6px;
            opacity: 0;
            z-index: 50;
        }

        .packet-return-style {
            background: #10b981 !important;
            /* 响应包为绿色 */
        }

        .ui-pulse {
            animation: pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .ai-loading {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 font-sans text-nowrap">

    <div
        class="bg-white w-full max-w-6xl rounded-3xl shadow-2xl border border-gray-100 overflow-hidden flex flex-col h-[95vh]">

        <!-- 视角切换 -->
        <div class="flex bg-gray-900 text-gray-400 text-sm font-bold shrink-0">
            <button id="tab-frontend" onclick="switchTab('frontend')"
                class="flex-1 py-3 text-center transition-all bg-gray-800 text-white border-t-2 border-blue-500">前端视角</button>
            <button id="tab-backend" onclick="switchTab('backend')"
                class="flex-1 py-3 text-center transition-all hover:text-white">微服务视角</button>
        </div>

        <div
            class="px-8 py-4 border-b border-gray-50 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shrink-0 bg-white">
            <div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight">架构物理模拟器 <span
                        class="text-green-600 text-xs">[全双工回程版]</span></h1>
                <p id="mode-desc" class="text-[10px] text-gray-400 mt-0.5 max-w-md italic text-wrap">
                    每一个请求都必须有回响，否则该物理连接将永远挂起并消耗内存。</p>
            </div>
            <div class="flex gap-4 text-[10px] font-mono">
                <div class="text-right">
                    <div class="text-gray-400">当前范式</div>
                    <div id="current-mode-label" class="font-bold text-gray-800 uppercase tracking-tighter">--</div>
                </div>
                <div class="text-right">
                    <div class="text-gray-400">单跳物理延迟</div>
                    <div id="latency-display" class="font-bold text-gray-800">1000ms</div>
                </div>
            </div>
        </div>

        <!-- 动态拓扑区 -->
        <div id="viz-container"
            class="flex-grow p-10 flex items-center justify-center relative bg-white overflow-hidden"></div>

        <!-- 生存诊断报告 -->
        <div id="report-panel"
            class="mx-6 mb-4 p-4 bg-gray-50 border border-gray-100 rounded-2xl shrink-0 h-28 overflow-y-auto">
            <h4 class="text-[10px] font-black text-gray-600 flex items-center gap-2 mb-2 uppercase">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                生存审计：全链路物理极限分析
            </h4>
            <div id="report-text"
                class="text-[10px] text-gray-500 leading-relaxed grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <!-- AI 生存审计顾问 -->
        <div class="mx-6 mb-6 p-4 bg-blue-50 border border-blue-100 rounded-2xl relative shrink-0">
            <div class="flex items-center justify-between mb-2">
                <h4 class="text-[10px] font-black text-blue-700 flex items-center gap-2 uppercase tracking-widest">AI
                    架构生存审计：物理极限诊断</h4>
                <button id="ai-ask-btn"
                    class="text-[9px] bg-blue-600 text-white px-3 py-1 rounded-full font-bold hover:bg-blue-700 transition-all disabled:opacity-50">深度审计
                    ✨</button>
            </div>
            <input id="ai-input" type="text" placeholder="描述场景 (如: 极高延迟下的异步写、弱网环境下的状态同步...)"
                class="w-full bg-white border border-blue-200 rounded-lg px-3 py-1.5 text-[10px] focus:outline-none focus:ring-2 focus:ring-blue-300 mb-2">
            <div id="ai-response-box" class="hidden">
                <div id="ai-loading" class="hidden h-10 w-full ai-loading rounded-md mb-1"></div>
                <div id="ai-content"
                    class="text-[10px] text-blue-800 leading-tight whitespace-pre-wrap max-h-20 overflow-y-auto"></div>
            </div>
        </div>

        <!-- 控制栏 -->
        <div
            class="bg-gray-100/50 p-6 flex flex-col md:flex-row items-center justify-between gap-6 shrink-0 border-t border-gray-100">
            <div class="flex flex-wrap items-center gap-6 w-full md:w-auto">
                <div class="flex flex-col gap-1 w-full md:w-72">
                    <label class="text-[9px] font-black text-gray-400 uppercase tracking-widest">物理架构范式</label>
                    <select id="mode-select"
                        class="bg-white border border-gray-200 rounded-lg px-3 py-2 text-xs font-bold text-gray-700 focus:outline-none cursor-pointer w-full"></select>
                </div>
                <div class="flex flex-col gap-1">
                    <label
                        class="text-[9px] font-black text-gray-400 uppercase flex justify-between tracking-widest">单跳物理延迟
                        <span id="latency-val" class="text-blue-600 font-mono">1000ms</span></label>
                    <input type="range" id="latency-slider" min="10" max="2000" value="1000"
                        class="w-32 md:w-48 h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </div>
            <button id="action-btn"
                class="w-full md:w-auto bg-gray-900 hover:bg-black text-white font-black px-8 py-3 rounded-xl text-xs shadow-lg transform active:scale-95 disabled:opacity-50">启动物理仿真</button>
        </div>
    </div>

    <!-- 作者署名 -->
    <div class="fixed bottom-4 right-6 pointer-events-none">
        <div class="flex items-center gap-2 px-3 py-1.5 bg-white/10 backdrop-blur-md border border-white/20 rounded-full shadow-sm">
            <span class="text-[10px] font-bold text-gray-400/80 tracking-widest uppercase">by</span>
            <span class="text-[10px] font-black text-gray-500/90 tracking-tighter">无敌小宝</span>
        </div>
    </div>

    <script>
        const apiKey = "";

        const ICONS = {
            client: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>',
            mobile: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>',
            spinner: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12c0 1.25.23 2.446.647 3.553M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>',
            db: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 1.1.9 2 2 2h12a2 2 0 002-2V7M4 7c0 1.1.9 2 2 2h12a2 2 0 002-2M4 7a2 2 0 012-2h12a2 2 0 012 2m-12 2v10m8-10v10"/>',
            service: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>',
            rabbit: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"/>',
            gateway: '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"/>'
        };

        const frontendConfigs = {
            ssr: {
                label: 'MPA / SSR (白屏阻塞)',
                nodes: [{ id: 'n1', title: 'Mobile UI', icon: 'mobile' }, { id: 'n2', title: 'Cloud Render', icon: 'service' }],
                report: ['基站建连延迟：移动无线网络（如5G/4G）唤醒极慢，SSR 每一步都需要完整的链路往返，在弱网下表现为断崖式白屏。', '离线彻底瘫痪：一旦进电梯或信号盲区，HTTP 通道断裂，整个 App 就变成废弃的“死壳”，无降级余地。']
            },
            crud: {
                label: 'SPA CRUD (菊花图陷阱)',
                nodes: [{ id: 'n1', title: 'Mobile App', icon: 'mobile' }, { id: 'n2', title: 'API Gateway', icon: 'gateway' }],
                report: ['Loading 锁死：将 UI 的生命交给了脆弱的移动信道，请求往往由于包物理丢失长久僵死（Pending），致使主线程阻塞。', '生命周期脆弱：App 从后台被切回或者锁屏，系统常常在此间干掉底层 TCP 连接，导致一半的 CRUD 流程意外折戟。']
            },
            optimistic: {
                label: '乐观更新 (假象与回滚)',
                nodes: [{ id: 'n1', title: 'Lie UI', icon: 'mobile' }, { id: 'n2', title: 'Remote State', icon: 'db' }],
                report: ['薛定谔的确权：在移动端，UI “瞬间完成”仅是欺骗手段。网络波动极易造成无线电磁报文物理消失，服务端压根没收到。', '状态撕裂重置：若后续 HTTP 超时返回错误，已经被改变的假象 UI 必须硬生生回回溯状态并突兀报错，严重损害确定性心理安全。']
            },
            local: {
                label: 'Local-First (离线物理隔离)',
                nodes: [{ id: 'n1', title: 'Mobile App', icon: 'mobile' }, { id: 'n2', title: 'Local DB', icon: 'db' }, { id: 'n3', title: 'Sync Engine', icon: 'rabbit' }, { id: 'n4', title: 'Cloud DB', icon: 'db' }],
                report: ['物理时空解藕：真正的 Native 基因。100% 的读写只接触本地边缘节点(如 SQLite/Room)。没有任何 Loading，哪怕在飞行模式也免疫弱网影响。', '网络降格配角：网络不再是主宰用户 UI 生死的恶魔，而变成了后台静默跟进的、通过 CRDT 解决最终数据冲突的“苦力工”。']
            }
        };

        const backendConfigs = {
            cascade_rpc: {
                label: '级联服务依赖 (Sync RPC)',
                nodes: [{ id: 'n1', title: 'Gateway', icon: 'gateway' }, { id: 'n2', title: 'Auth-SVC', icon: 'service' }, { id: 'n3', title: 'Order-SVC', icon: 'service' }, { id: 'n4', title: 'Database', icon: 'db' }],
                report: ['微服务雪崩：全员同步阻塞，只要 DB 慢查询 1 秒，前序所有节点的内核 Socket 与线程全部挂起，雪崩至前端。', '木桶效应：整条物理连接的生死取决于最底层的响应速度。']
            },
            mq_saga: {
                label: '异步削峰填谷 (MQ Saga)',
                nodes: [{ id: 'n1', title: 'API Node', icon: 'gateway' }, { id: 'n2', title: 'Producer', icon: 'service' }, { id: 'n3', title: 'Kafka / MQ', icon: 'rabbit' }, { id: 'n4', title: 'Consumer', icon: 'service' }],
                report: ['物理解耦：数据落到硬盘即算结束该段生命周期，API 立即释放 HTTP 线程，极大提升并发上限。', '分布式补偿：若 Consumer 处理失败，由于 API 已向用户承诺成功，必须依赖死信队列进行补偿。']
            },
            cqrs_sync: {
                label: '读写分离延迟 (CQRS/Binlog)',
                nodes: [{ id: 'n1', title: 'Client', icon: 'client' }, { id: 'n2', title: 'Master DB', icon: 'db' }, { id: 'n3', title: 'Binlog Sync', icon: 'service' }, { id: 'n4', title: 'Slave DB', icon: 'db' }],
                report: ['幽灵读：前端刚完成写入得到 ACK，立即发起 Query 读取，但 Binlog 同步因网络震荡延迟，查出空数据。', 'CAP 妥协：为高可用和写吞吐牺牲强一致性时间线，UI 需靠「乐观更新」或「延迟重试」填补该物理裂痕。']
            },
            cache_miss: {
                label: '缓存穿透击穿 (Cache Miss)',
                nodes: [{ id: 'n1', title: 'Gateway', icon: 'gateway' }, { id: 'n2', title: 'App Node', icon: 'service' }, { id: 'n3', title: 'Redis Cluster', icon: 'db' }, { id: 'n4', title: 'MySQL DB', icon: 'db' }],
                report: ['击穿绝境：热点 Key 失效瞬息，十万并发请求绕过缓存涌向 MySQL，由于并发暴增瞬间耗尽线程吃满 CPU。', '回源锁暴增：必须施加「分布式互斥锁（Mutex）」，强行挂起其余并发流，独留单线程执行真实物理 DB 寻址并回种缓存。']
            }
        };

        let currentTab = 'frontend';
        let currentConfigs = frontendConfigs;
        let isRunning = false;

        const el = {
            viz: document.getElementById('viz-container'),
            select: document.getElementById('mode-select'),
            latency: document.getElementById('latency-slider'),
            latencyVal: document.getElementById('latency-val'),
            latencyDisplay: document.getElementById('latency-display'),
            report: document.getElementById('report-text'),
            modeLabel: document.getElementById('current-mode-label'),
            actionBtn: document.getElementById('action-btn'),
            ai: { btn: document.getElementById('ai-ask-btn'), input: document.getElementById('ai-input'), box: document.getElementById('ai-response-box'), loading: document.getElementById('ai-loading'), content: document.getElementById('ai-content') }
        };

        function switchTab(tab) {
            if (isRunning) return;
            currentTab = tab;
            currentConfigs = (tab === 'frontend') ? frontendConfigs : backendConfigs;
            document.getElementById('tab-frontend').className = `flex-1 py-3 text-center transition-all ${tab === 'frontend' ? 'bg-gray-800 text-white border-t-2 border-blue-500' : 'text-gray-400 hover:text-white bg-gray-900 border-t-2 border-transparent'}`;
            document.getElementById('tab-backend').className = `flex-1 py-3 text-center transition-all ${tab === 'backend' ? 'bg-gray-800 text-white border-t-2 border-blue-500' : 'text-gray-400 hover:text-white bg-gray-900 border-t-2 border-transparent'}`;
            el.select.innerHTML = '';
            Object.keys(currentConfigs).forEach((key, i) => {
                const opt = document.createElement('option'); opt.value = key; opt.innerText = `${i + 1}. ${currentConfigs[key].label}`;
                el.select.appendChild(opt);
            });
            renderTopology();
        }

        function renderTopology() {
            const config = currentConfigs[el.select.value];
            el.viz.innerHTML = ''; el.modeLabel.innerText = config.label;
            el.report.innerHTML = `<div><span class="text-red-600 font-bold block mb-1">物理死穴：</span>${config.report[0]}</div><div><span class="text-blue-600 font-bold block mb-1">损耗解析：</span>${config.report[1]}</div>`;
            const container = document.createElement('div'); container.className = 'flex items-center justify-between w-full max-w-5xl relative z-10';
            config.nodes.forEach((node, i) => {
                const nodeDiv = document.createElement('div'); nodeDiv.className = 'flex flex-col items-center gap-3 w-32 node-container';
                nodeDiv.innerHTML = `
                    <div class="text-[9px] font-black text-gray-400 uppercase tracking-tighter text-center h-4">${node.title}</div>
                    <div id="node-${node.id}" class="w-20 h-20 rounded-full border-4 border-gray-200 flex items-center justify-center transition-all duration-300 shadow-inner bg-gray-50 relative">
                        <svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">${ICONS[node.icon]}</svg>
                        <div id="badge-${node.id}" class="absolute -top-2 -right-2 bg-blue-500 text-white text-[7px] font-bold px-1.5 py-0.5 rounded hidden tracking-tighter">WAITING ACK</div>
                    </div>
                    <div class="text-center"><div id="status-${node.id}" class="text-[9px] text-gray-400 uppercase font-bold">IDLE</div></div>`;
                container.appendChild(nodeDiv);
                if (i < config.nodes.length - 1) {
                    const pipe = document.createElement('div'); pipe.className = 'flex-grow px-2 relative h-0.5 pipeline-line';
                    pipe.innerHTML = `<div id="packet-${i}" class="packet"></div>`;
                    container.appendChild(pipe);
                }
            });
            el.viz.appendChild(container);
        }

        async function runSimulation() {
            if (isRunning) return;
            isRunning = true; el.actionBtn.disabled = true;
            const mode = el.select.value;
            const lat = parseInt(el.latency.value);

            const markState = (id, text, type) => {
                const node = document.getElementById(`node-${id}`);
                const status = document.getElementById(`status-${id}`);
                const badge = document.getElementById(`badge-${id}`);
                if (type === 'busy') {
                    node.className = 'w-20 h-20 rounded-full border-4 border-blue-400 flex items-center justify-center bg-gray-50 relative ui-pulse';
                    status.innerText = text; status.className = 'text-[9px] text-blue-500 font-bold';
                    badge.classList.remove('hidden');
                } else if (type === 'success') {
                    node.className = 'w-20 h-20 rounded-full border-4 border-green-500 flex items-center justify-center bg-green-50 relative';
                    status.innerText = text; status.className = 'text-[9px] text-green-600 font-bold';
                    badge.classList.add('hidden');
                } else if (type === 'error') {
                    node.className = 'w-20 h-20 rounded-full border-4 border-red-500 flex items-center justify-center bg-red-50 relative ui-pulse';
                    status.innerText = text; status.className = 'text-[9px] text-red-600 font-bold';
                    badge.classList.add('hidden');
                } else {
                    node.className = 'w-20 h-20 rounded-full border-4 border-gray-200 flex items-center justify-center bg-gray-50 relative';
                    status.innerText = text; status.className = 'text-[9px] text-gray-400 font-bold';
                    badge.classList.add('hidden');
                }
            };

            const sendPacket = async (i, isReturn = false, customLat, isError = false) => {
                const packet = document.getElementById(`packet-${i}`);
                if (!packet) return;
                const d = customLat !== undefined ? customLat : lat;
                packet.classList.remove('packet-return-style', 'packet-error-style');
                if (isError) packet.classList.add('packet-error-style');
                else if (isReturn) packet.classList.add('packet-return-style');

                packet.style.animation = `${isReturn ? 'packet-return' : 'packet-move'} ${d / 1000}s linear forwards`;
                await new Promise(r => setTimeout(r, d));
                packet.style.animation = 'none'; packet.style.opacity = '0';
            };

            if (mode === 'mq_saga') {
                markState('n1', 'SENDING', 'busy'); await sendPacket(0);
                markState('n2', 'PUBLISHING', 'busy'); await sendPacket(1);
                markState('n3', 'BUFFERING', 'busy');
                await new Promise(r => setTimeout(r, 400));
                // 确权返回
                await sendPacket(1, true); markState('n2', 'ACK RCVD', 'success');
                await sendPacket(0, true); markState('n1', 'COMPLETE ✨', 'success');
                // 后台处理
                markState('n3', 'MQ PUSH', 'busy'); await sendPacket(2);
                markState('n4', 'WORKING', 'busy'); await new Promise(r => setTimeout(r, lat > 600 ? lat : 600));
                await sendPacket(2, true); markState('n3', 'ACK DONE', 'success'); markState('n4', 'DONE', 'success');
            }
            else if (mode === 'cqrs_sync') {
                markState('n1', 'WRITE REQ', 'busy'); await sendPacket(0);
                markState('n2', 'LOG APPEND', 'busy');
                await new Promise(r => setTimeout(r, 300));

                await sendPacket(0, true); markState('n1', 'ACK GOT', 'success'); markState('n2', 'MASTER OK', 'success');

                await sendPacket(1); markState('n3', 'STREAM LOG', 'busy');
                await new Promise(r => setTimeout(r, lat > 500 ? lat : 500));

                await sendPacket(2); markState('n4', 'REPLICATING', 'busy');
                await new Promise(r => setTimeout(r, 300));
                markState('n4', 'SLAVE OK', 'success'); markState('n3', 'SYNC DONE', 'success');
            }
            else if (mode === 'cache_miss') {
                markState('n1', 'QUERY', 'busy'); await sendPacket(0);
                markState('n2', 'CHECK GET', 'busy'); await sendPacket(1);

                const n3Node = document.getElementById('node-n3');
                n3Node.classList.remove('border-blue-400', 'border-gray-200');
                n3Node.classList.add('border-red-500', 'bg-red-50', 'ui-pulse');
                document.getElementById('status-n3').className = 'text-[9px] text-red-600 font-bold';
                document.getElementById('status-n3').innerText = 'MISS DROP!';
                await new Promise(r => setTimeout(r, 400));

                markState('n3', 'BYPASS', 'busy'); await sendPacket(2);
                markState('n4', 'DB SCAN', 'busy');
                await new Promise(r => setTimeout(r, lat + 600));

                await sendPacket(2, true); markState('n4', 'DB FOUND', 'success');

                n3Node.className = 'w-20 h-20 rounded-full border-4 border-yellow-500 flex items-center justify-center bg-yellow-50 relative ui-pulse';
                document.getElementById('status-n3').className = 'text-[9px] text-yellow-600 font-bold';
                document.getElementById('status-n3').innerText = 'SETTING CACHE';
                await new Promise(r => setTimeout(r, 300));

                markState('n3', 'CACHE WARM', 'success');
                await sendPacket(1, true); markState('n2', 'DATA PARSED', 'success');
                await sendPacket(0, true); markState('n1', 'COMPLETE', 'success');
            }
            else if (mode === 'ssr') {
                markState('n1', 'BLANK SCREEN', 'busy');
                document.getElementById('node-n1').classList.replace('bg-gray-50', 'bg-gray-800');
                await sendPacket(0);
                markState('n2', 'HTML RENDER', 'busy');
                await new Promise(r => setTimeout(r, lat + 400));
                await sendPacket(0, true);
                markState('n1', 'FULL PAINT', 'success'); markState('n2', 'IDLE', 'success');
            }
            else if (mode === 'crud') {
                const nodeIcon = document.querySelector(`#node-n1 svg`);
                const originalIcon = nodeIcon.innerHTML;
                nodeIcon.innerHTML = ICONS.spinner;
                nodeIcon.classList.add('animate-spin', 'text-blue-500');

                markState('n1', 'LOADING...', 'busy'); await sendPacket(0);
                markState('n2', 'QUERY API', 'busy');
                await new Promise(r => setTimeout(r, lat));

                if (lat > 1500) {
                    markState('n1', 'TIMEOUT PENDING', 'error');
                    await new Promise(r => setTimeout(r, 800));
                }

                await sendPacket(0, true);
                nodeIcon.classList.remove('animate-spin', 'text-blue-500');
                nodeIcon.innerHTML = originalIcon;
                markState('n1', 'DATA RENDER', 'success'); markState('n2', 'IDLE', 'success');
            }
            else if (mode === 'optimistic') {
                markState('n1', 'INSTANT SUCCESS', 'success');
                await sendPacket(0);

                markState('n2', 'NETWORK DROP', 'error');
                await new Promise(r => setTimeout(r, 800)); // waiting aimlessly

                // Red packet back
                await sendPacket(0, true, lat, true);

                markState('n1', 'UI ROLLBACK!', 'error');
                markState('n2', 'FAILED', 'error');
            }
            else if (mode === 'local') {
                markState('n1', 'USER WRITE', 'busy');
                await sendPacket(0, false, 50); // fast local pipe
                markState('n2', 'SQLITE PERSIST', 'success');
                await sendPacket(0, true, 50); // fast ack
                markState('n1', 'UI UNBLOCKED! ⚡', 'success');

                await new Promise(r => setTimeout(r, 400));

                // background engine
                markState('n3', 'BATCH SYNC', 'busy');
                await sendPacket(1, false, 200);
                markState('n3', 'WEAK NET PUSH', 'busy');
                await sendPacket(2, false, lat);

                markState('n4', 'CLOUD MERGE', 'success');
                await sendPacket(2, true, lat);
                markState('n3', 'SYNC ACK', 'success');
                await sendPacket(1, true, 200);
                markState('n2', 'IDLE', 'success');
            }
            else {
                const nodes = currentConfigs[mode].nodes;
                for (let i = 0; i < nodes.length; i++) {
                    markState(nodes[i].id, 'PROC...', 'busy');
                    await new Promise(r => setTimeout(r, 300));
                    if (i < nodes.length - 1) await sendPacket(i);
                }
                for (let i = nodes.length - 1; i >= 0; i--) {
                    if (i > 0) { await sendPacket(i - 1, true); markState(nodes[i].id, 'ACK OUT', 'success'); }
                    else { markState(nodes[i].id, 'FINISHED', 'success'); }
                    await new Promise(r => setTimeout(r, 200));
                }
            }

            el.actionBtn.disabled = false; isRunning = false;
        }

        async function askAI() {
            const input = el.ai.input.value.trim(); if (!input) return;
            el.ai.box.classList.remove('hidden'); el.ai.loading.classList.remove('hidden'); el.ai.content.innerText = ''; el.ai.btn.disabled = true;
            const sys = `审计专家。场景: ${input}。指出 10w QPS 下的物理碎裂点(锁、回程ACK丢失、内存耗尽)，120字内。`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: input }] }], systemInstruction: { parts: [{ text: sys }] } })
                });
                const result = await response.json(); el.ai.content.innerText = result.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (err) { el.ai.content.innerText = "审计失败：链路阻塞。"; }
            finally { el.ai.loading.classList.add('hidden'); el.ai.btn.disabled = false; }
        }

        el.select.addEventListener('change', renderTopology);
        el.latency.addEventListener('input', e => {
            el.latencyVal.innerText = e.target.value + 'ms';
            el.latencyDisplay.innerText = e.target.value + 'ms';
        });
        el.actionBtn.addEventListener('click', runSimulation);
        el.ai.btn.addEventListener('click', askAI);
        window.onload = () => switchTab('frontend');
    </script>
</body>

</html>
